name: Daily Keep-Alive Commit

on:
  schedule:
    # Runs every day at 12:00 UTC
    - cron: '0 12 * * *'
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update keep-alive timestamp
        run: |
          echo "Last keep-alive: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > keep_alive.txt

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add keep_alive.txt
          git commit -m "chore: daily keep-alive commit [$(date -u '+%Y-%m-%d')]"
          git push
